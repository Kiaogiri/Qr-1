<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto Saya</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
      font-family:sans-serif;
    }

    .frame{
      background:white;
      padding:15px;
      border-radius:20px;
      box-shadow:
      0 0 20px rgba(255,255,255,0.2),
      0 0 40px rgba(255,255,255,0.1);
    }

    img{
      width:300px;
      max-width:90vw;
      border-radius:12px;
      display:block;
    }
  </style>
</head>
<body>

  <div class="frame">
    <img src="Foto.jpg" alt="Foto">
  </div>

</body>
</html>
